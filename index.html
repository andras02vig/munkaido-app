<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Log</title>
    <style>
        :root {
            --accent-color: #fca311;
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --danger: #ff453a;
            --success: #32d74b;
        }

        body {
            margin: 0;
            padding: 20px 15px 100px 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1c1c1e 50%, #000000 100%);
            background-attachment: fixed;
            color: var(--text-main);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            padding: 12px;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 1;
        }

        .btn-primary {
            background: var(--accent-color);
            color: #000;
            width: 100%;
            margin-top: 15px;
            font-size: 17px;
            padding: 14px;
        }

        /* Forms & Inputs */
        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-left: 4px;
        }

        input, select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-size: 16px; /* Prevents iOS zoom */
            color-scheme: dark;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        /* Lists and Items */
        .week-header {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-color);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shift-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .shift-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .shift-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .shift-date {
            font-size: 14px;
            color: var(--text-muted);
        }

        .shift-time {
            font-size: 17px;
            font-weight: 500;
        }

        .shift-role {
            font-size: 12px;
            color: var(--accent-color);
            background: rgba(252, 163, 17, 0.15);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            width: fit-content;
        }

        .shift-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .shift-pay {
            font-size: 16px;
            font-weight: 600;
        }

        .btn-delete {
            background: none;
            color: var(--danger);
            padding: 5px;
            font-size: 20px;
            margin: 0;
        }

        /* Summaries */
        .week-summary {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
            color: var(--text-muted);
        }

        .summary-row.total {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0;
        }

        .ot-indicator {
            font-size: 11px;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 2px 6px;
            border-radius: 6px;
            margin-top: 4px;
        }

        /* Utilities */
        .hidden { display: none !important; }
        .text-accent { color: var(--accent-color); }
    </style>
</head>
<body>

    <h1>Work Log</h1>

    <div class="top-controls">
        <button class="btn-outline" onclick="manageProfiles()">⚙️ Positions</button>
        <button class="btn-outline" onclick="startNewWeek()">📅 New Week</button>
    </div>

    <div id="inputSection" class="glass-card hidden">
        <div class="week-header">
            <span id="activeWeekTitle">Current Week</span>
        </div>
        
        <div class="input-row">
            <div class="input-group" style="flex: 1.5;">
                <label>Date</label>
                <input type="date" id="dateInput">
            </div>
            <div class="input-group" style="flex: 2;">
                <label>Position</label>
                <select id="profileSelect"></select>
            </div>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>Start</label>
                <input type="time" id="startInput">
            </div>
            <div class="input-group">
                <label>End</label>
                <input type="time" id="endInput">
            </div>
        </div>

        <button class="btn-primary" onclick="addShift()">Add Shift</button>
    </div>

    <div id="weeksContainer"></div>

    <script>
        // --- DATA STRUCTURE ---
        // profiles: [{id, name, wage, otWage}]
        // weeks: [{ id, title, shifts: [{id, date, profileId, start, end, minutes}] }]
        
        let profiles = JSON.parse(localStorage.getItem('workLogProfiles_v2'));
        if (!profiles || profiles.length === 0) {
            profiles = [
                { id: 'busser', name: 'Busser', wage: 10.60, otWage: 19.71 },
                { id: 'dishwasher', name: 'Dishwasher', wage: 10.60, otWage: 19.71 }
            ];
            localStorage.setItem('workLogProfiles_v2', JSON.stringify(profiles));
        }

        let weeks = JSON.parse(localStorage.getItem('workLogWeeks_v2')) || [];
        let activeWeekId = weeks.length > 0 ? weeks[0].id : null; // First in array is the newest

        document.getElementById('dateInput').valueAsDate = new Date();

        // --- CORE FUNCTIONS ---

        function saveData() {
            localStorage.setItem('workLogWeeks_v2', JSON.stringify(weeks));
            localStorage.setItem('workLogProfiles_v2', JSON.stringify(profiles));
        }

        function manageProfiles() {
            const name = prompt("Enter new position name (e.g., Server):");
            if (!name) return;
            
            const wage = parseFloat(prompt(`Hourly wage for ${name}? ($)`).replace(',', '.'));
            if (isNaN(wage)) return alert("Invalid amount.");
            
            const defaultOt = (wage * 1.86).toFixed(2);
            const otWage = parseFloat(prompt(`Overtime wage? (Default 1.86x multiplier)`, defaultOt).replace(',', '.'));
            if (isNaN(otWage)) return alert("Invalid amount.");

            profiles.push({ id: Date.now().toString(), name, wage, otWage });
            saveData();
            renderUI();
        }

        function startNewWeek() {
            const title = prompt("Name this week (e.g., June 29 - July 5):");
            if (!title) return;

            const newWeek = {
                id: Date.now().toString(),
                title: title,
                shifts: []
            };

            // Add to the beginning of the array so newest is on top
            weeks.unshift(newWeek);
            activeWeekId = newWeek.id;
            saveData();
            renderUI();
        }

        function addShift() {
            if (!activeWeekId) return alert("Please create a New Week first!");

            const date = document.getElementById('dateInput').value;
            const profileId = document.getElementById('profileSelect').value;
            const start = document.getElementById('startInput').value;
            const end = document.getElementById('endInput').value;

            if (!date || !start || !end) return alert("Please fill in all time fields.");

            const startTime = new Date(`1970-01-01T${start}:00`);
            const endTime = new Date(`1970-01-01T${end}:00`);
            let diffMins = (endTime - startTime) / 1000 / 60;
            if (diffMins < 0) diffMins += 24 * 60; // Crosses midnight

            const activeWeek = weeks.find(w => w.id === activeWeekId);
            activeWeek.shifts.push({
                id: Date.now().toString(),
                date, profileId, start, end, minutes: diffMins
            });

            saveData();
            renderUI();

            document.getElementById('startInput').value = '';
            document.getElementById('endInput').value = '';
        }

        function deleteShift(weekId, shiftId) {
            if(!confirm("Delete this shift?")) return;
            const week = weeks.find(w => w.id === weekId);
            week.shifts = week.shifts.filter(s => s.id !== shiftId);
            saveData();
            renderUI();
        }

        // --- RENDER LOGIC (INCLUDING OVERTIME) ---

        function renderUI() {
            // Update Profile Select
            const select = document.getElementById('profileSelect');
            const currentVal = select.value;
            select.innerHTML = '';
            profiles.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.name} ($${p.wage})`;
                select.appendChild(opt);
            });
            if (currentVal && profiles.some(p => p.id === currentVal)) select.value = currentVal;

            // Handle Input Section Visibility
            const inputSection = document.getElementById('inputSection');
            if (weeks.length === 0) {
                inputSection.classList.add('hidden');
                document.getElementById('weeksContainer').innerHTML = `<div class="glass-card" style="text-align:center; color: var(--text-muted);">Tap "New Week" to start tracking.</div>`;
                return;
            } else {
                inputSection.classList.remove('hidden');
                activeWeekId = weeks[0].id; // Ensure top week is active
                document.getElementById('activeWeekTitle').textContent = `Adding to: ${weeks[0].title}`;
            }

            const container = document.getElementById('weeksContainer');
            container.innerHTML = '';

            // Render Weeks
            weeks.forEach((week, index) => {
                const isLatest = index === 0; // Only the most recent week is "open" for adding visually via the top form

                // 1. Sort shifts chronologically for accurate Overtime calculation
                week.shifts.sort((a, b) => new Date(a.date + 'T' + a.start) - new Date(b.date + 'T' + b.start));

                let cumulativeMinutes = 0;
                let totalWeekPay = 0;
                let totalOTMinutes = 0;

                let shiftsHTML = '';

                // 2. Calculate shifts
                week.shifts.forEach(shift => {
                    const profile = profiles.find(p => p.id === shift.profileId) || profiles[0];
                    
                    let regMins = 0;
                    let otMins = 0;
                    
                    // OT Logic: over 40 hours (2400 minutes)
                    if (cumulativeMinutes >= 2400) {
                        otMins = shift.minutes; // All OT
                    } else if (cumulativeMinutes + shift.minutes > 2400) {
                        regMins = 2400 - cumulativeMinutes; // Fill up to 40h
                        otMins = shift.minutes - regMins;   // Rest is OT
                    } else {
                        regMins = shift.minutes; // All Regular
                    }

                    cumulativeMinutes += shift.minutes;
                    totalOTMinutes += otMins;

                    const shiftPay = (regMins / 60) * profile.wage + (otMins / 60) * profile.otWage;
                    totalWeekPay += shiftPay;

                    // Formatting date
                    const d = new Date(shift.date);
                    const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

                    shiftsHTML += `
                        <div class="shift-item">
                            <div class="shift-info">
                                <span class="shift-date">${dateStr}</span>
                                <span class="shift-role">${profile.name}</span>
                                <span class="shift-time">${shift.start} - ${shift.end}</span>
                                ${otMins > 0 ? `<span class="ot-indicator">Includes OT</span>` : ''}
                            </div>
                            <div class="shift-right">
                                <button class="btn-delete" onclick="deleteShift('${week.id}', '${shift.id}')">✕</button>
                                <span class="shift-pay">$${shiftPay.toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                });

                // Format Summaries
                const totalHours = Math.floor(cumulativeMinutes / 60);
                const totalMins = cumulativeMinutes % 60;
                const otHours = Math.floor(totalOTMinutes / 60);
                const otRemainingMins = totalOTMinutes % 60;

                const weekHTML = `
                    <div class="glass-card">
                        <div class="week-header">
                            <span>🗓 ${week.title}</span>
                            ${isLatest ? `<span style="font-size: 12px; color: var(--success); font-weight: normal;">Active</span>` : ''}
                        </div>
                        
                        <div class="shift-list">
                            ${shiftsHTML || '<div style="color:var(--text-muted); font-size: 14px; text-align:center;">No shifts added yet.</div>'}
                        </div>

                        <div class="week-summary">
                            <div class="summary-row">
                                <span>Total Time:</span>
                                <span style="color: white;">${totalHours}h ${totalMins}m</span>
                            </div>
                            <div class="summary-row">
                                <span>Overtime (40h+):</span>
                                <span class="${totalOTMinutes > 0 ? 'text-accent' : ''}">${otHours}h ${otRemainingMins}m</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total Pay:</span>
                                <span class="text-accent">$${totalWeekPay.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML += weekHTML;
            });
        }

        // --- INIT ---
        renderUI();

    </script>
</body>
</html>
